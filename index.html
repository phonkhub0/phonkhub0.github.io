<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Phonkhub</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>

/* =========================
RESET
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:white;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* =========================
SCROLLBAR
========================= */

::-webkit-scrollbar{
  width:10px;
}

::-webkit-scrollbar-track{
  background:#111;
}

::-webkit-scrollbar-thumb{
  background:#ff9900;
  border-radius:999px;
}

/* =========================
INTRO
========================= */

#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  z-index:999999;
}

.intro-content{
  position:relative;
  z-index:5;
  text-align:center;
}

.intro-logo{
  font-size:6rem;
  font-weight:900;
  text-shadow:
    0 0 20px #ff9900,
    0 0 60px #ff9900;
}

.intro-logo span{
  background:#ff9900;
  color:black;
  padding:6px 15px;
  border-radius:12px;
}

.intro-sub{
  margin-top:20px;
  color:#888;
  letter-spacing:8px;
}

.enter-btn{
  margin-top:35px;
  border:none;
  background:#ff9900;
  color:black;
  padding:18px 50px;
  border-radius:16px;
  font-weight:900;
  cursor:pointer;
  font-size:1rem;
}

.particle{
  position:absolute;
  width:4px;
  height:4px;
  background:#ff9900;
  border-radius:50%;
  animation:float linear infinite;
}

@keyframes float{

  from{
    transform:translateY(100vh);
  }

  to{
    transform:translateY(-20vh);
  }

}

/* =========================
HEADER
========================= */

header{
  position:sticky;
  top:0;
  z-index:1000;
  background:#000000cc;
  backdrop-filter:blur(10px);
  border-bottom:1px solid #222;
}

.nav{
  max-width:1400px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.logo{
  font-size:2.5rem;
  font-weight:900;
}

.logo span{
  background:#ff9900;
  color:black;
  padding:4px 10px;
  border-radius:10px;
}

/* =========================
LAYOUT
========================= */

.main-layout{
  display:grid;
  grid-template-columns:1fr 320px;
  gap:30px;
  width:min(1500px,95%);
  margin:auto;
  padding:40px 0;
}

/* =========================
TRACKS
========================= */

.section-title{
  font-size:3rem;
  margin-bottom:35px;
}

.tracks{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(330px,1fr));
  gap:25px;
}

.card{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:24px;
  overflow:hidden;
  transition:.3s;
}

.card:hover{
  transform:translateY(-8px);
  border-color:#ff9900;
}

.legendary{
  box-shadow:
    0 0 30px #ff990055,
    0 0 70px #ff000044;
}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.card-content{
  padding:22px;
}

.card h2{
  margin-bottom:10px;
}

.card p{
  color:#999;
  margin-bottom:18px;
}

.controls{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.like-btn,
.playlist-btn{
  flex:1;
  border:none;
  background:#1b1b1b;
  color:white;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  transition:.2s;
}

.like-btn:hover,
.playlist-btn:hover{
  background:#ff9900;
  color:black;
}

/* =========================
VISUALIZER
========================= */

.visualizer{
  display:flex;
  align-items:flex-end;
  gap:4px;
  height:45px;
  margin-bottom:15px;
}

.bar{
  width:100%;
  background:#ff9900;
  border-radius:999px;
  transform:scaleY(.3);
}

.bar.active{
  animation:bounce 1s infinite ease-in-out;
}

.bar:nth-child(1){
  animation-delay:0s;
}

.bar:nth-child(2){
  animation-delay:.2s;
}

.bar:nth-child(3){
  animation-delay:.4s;
}

.bar:nth-child(4){
  animation-delay:.6s;
}

.bar:nth-child(5){
  animation-delay:.8s;
}

@keyframes bounce{

  0%,100%{
    transform:scaleY(.4);
  }

  50%{
    transform:scaleY(1.2);
  }

}

/* =========================
AUDIO
========================= */

audio{
  width:100%;
}

/* =========================
RATING
========================= */

.rating{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:18px;
  color:#ff9900;
  font-weight:900;
}

/* =========================
SIDEBAR
========================= */

.sidebar{
  position:sticky;
  top:100px;
  height:fit-content;
}

.panel{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:22px;
  padding:20px;
  margin-bottom:25px;
}

.panel h3{
  margin-bottom:18px;
}

.saved-track{
  background:#181818;
  border-radius:14px;
  padding:12px;
  margin-top:10px;
  cursor:pointer;
  transition:.2s;
}

.saved-track:hover{
  background:#222;
}

/* =========================
MOBILE
========================= */

@media(max-width:1000px){

  .main-layout{
    grid-template-columns:1fr;
  }

  .sidebar{
    position:relative;
    top:0;
  }

}

@media(max-width:700px){

  .intro-logo{
    font-size:3.5rem;
  }

  .section-title{
    font-size:2rem;
  }

}

</style>
</head>

<body>

<!-- =========================
INTRO
========================= -->

<div id="intro">

  <div id="particles"></div>

  <div class="intro-content">

    <div class="intro-logo">
      Phonk<span>hub</span>
    </div>

    <div class="intro-sub">
      MAXIMUM AURA DETECTED
    </div>

    <button class="enter-btn" onclick="enterSite()">
      ENTER THE PHONK
    </button>

  </div>

</div>

<!-- =========================
HEADER
========================= -->

<header>

  <div class="nav">

    <div class="logo">
      Phonk<span>hub</span>
    </div>

  </div>

</header>

<!-- =========================
MAIN
========================= -->

<div class="main-layout">

  <!-- TRACKS -->

  <div>

    <h1 class="section-title">
      TOP AURA TRACKS
    </h1>

    <section class="tracks" id="tracks"></section>

  </div>

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="panel">

      <h3>❤️ Liked Songs</h3>

      <div id="likedSongs"></div>

    </div>

    <div class="panel">

      <h3>📀 Playlist</h3>

      <div id="playlistSongs"></div>

    </div>

  </aside>

</div>

<script>

/* =========================
INTRO
========================= */

const particles =
document.getElementById("particles");

for(let i=0;i<80;i++){

  const p =
  document.createElement("div");

  p.classList.add("particle");

  p.style.left =
  Math.random()*100 + "vw";

  p.style.animationDuration =
  3 + Math.random()*5 + "s";

  p.style.opacity =
  Math.random();

  particles.appendChild(p);

}

function enterSite(){

  const intro =
  document.getElementById("intro");

  intro.style.transition =
  "1s";

  intro.style.opacity = "0";

  setTimeout(()=>{

    intro.remove();

  },1000);

}

/* =========================
TRACK DATA
========================= */

const tracks = [

{
title:"PASSO BEM SOLTO",
desc:"3am epstien sigma phonk balkan aura 🥷🏿🍑🗿🍷🇮🇱.",
cover:"/IMG_3842.jpeg",
audio:"/ATLXS__PASSO_BEM_SOLTO.m4a",
rating:6
},

{
title:"YARA YARA PHONK",
desc:"forbidden phonk me and the boiz 😈🇮🇱🥷🏿🗿🍷.",
cover:"/IMG_3041.jpeg",
audio:"/YTDown_YouTube_Media_zdgtyoxKb6k_009_128k.mp3",
rating:10
},

{
title:"MI PAN X YARAYARA",
desc:"aura of letter t 🗿🗿🥷🏿🥷🏿🥷🏿🍗🍗🔫🔫🔫.",
cover:"/IMG_2220.png",
audio:"/ssstik.io_1779248438589.mp3",
rating:9
},

{
title:"YA LILI",
desc:"sahur boom.",
cover:"/IMG_2232.jpeg",
audio:"/Yalili yalila song in fast and furious--fast and furious 8--fast and furious 8 yalili yalila song.mp3",
rating:8
},

{
title:"MIGUEL PHONk",
desc:"nærgerr.",
cover:"/IMG_1159.gif",
audio:"/Miguel Phonk - 4k video.mp3",
rating:5
},

{
title:"VEM VEM",
desc:"standard phonk.",
cover:"/IMG_3806.jpeg",
audio:"/Jmilton - Vem Vem [Official Visualizer] - Jmilton.mp3",
rating:7
},

{
title:"Sigon Pex FUNK",
desc:"poblox rorn phonk.",
cover:"/IMG_2352.jpeg",
audio:"/Sigeon Pex - The Musical.mp3",
rating:7
},

{
title:"NECK HURT",
desc:"bombaclat wallahi.",
cover:"/IMG_2356.jpeg",
audio:"/Montagem SuperSonic Neck Hurts Version.mp3",
rating:7
},

{
title:"TIKI TIKI",
desc:"AURA ZUZU PEEPEENUTR.",
cover:"/IMG_2238.jpeg",
audio:"/TIKI TIKI (Slowed).mp3",
rating:9
},

{
title:"POISON SHIT 2.0",
desc:"poison puh.",
cover:"/IMG_2030.jpeg",
audio:"/YTDown_YouTube_MI-PAN-ZUZUZU-SONG-2-MPZZZ-x-Phonk-x-Bar_Media_exyVsRGBqAI_009_128k.mp3",
rating:2
},

{
title:"POISON SHIT",
desc:"maximum trollface poison.",
cover:"/IMG_2026.jpeg",
audio:"/YTDown_YouTube_MI-PAN-ZUZUZU-PHONK-X-REGGAETON-BEAT-X-B_Media_75YO4AK0Dlc_008_128k.mp3",
rating:1
}

];

/* =========================
LOCAL STORAGE
========================= */

let likedSongs =
JSON.parse(
localStorage.getItem("likedSongs")
) || [];

let playlistSongs =
JSON.parse(
localStorage.getItem("playlistSongs")
) || [];

/* =========================
CURRENT AUDIO
========================= */

let currentAudio = null;

/* =========================
RENDER TRACKS
========================= */

const tracksContainer =
document.getElementById("tracks");

tracks.forEach((track,index)=>{

  let aura = "🙂";
  let auraText = "BASE";

  if(track.rating >= 3){

    aura = "😎";
    auraText = "SIGMA";

  }

  if(track.rating >= 5){

    aura = "🔥";
    auraText = "DRIFT";

  }

  if(track.rating >= 7){

    aura = "😈";
    auraText = "COSMIC";

  }

  if(track.rating >= 9){

    aura = "💀";
    auraText = "ULTRA AURA";

  }

  const card =
  document.createElement("div");

  card.className =
  track.rating >= 9
  ? "card legendary"
  : "card";

  card.innerHTML = `

    <img src="${track.cover}">

    <div class="card-content">

      <h2>${track.title}</h2>

      <p>${track.desc}</p>

      <div class="visualizer">

        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>

      </div>

      <audio controls>

        <source src="${track.audio}">

      </audio>

      <div class="rating">

        <span>${aura} ${auraText}</span>

        <span>${track.rating}/10</span>

      </div>

      <div class="controls">

        <button class="like-btn">
          ❤️ Like
        </button>

        <button class="playlist-btn">
          📀 Playlist
        </button>

      </div>

    </div>

  `;

  const audio =
  card.querySelector("audio");

  const bars =
  card.querySelectorAll(".bar");

  /* PAUSE OTHER SONGS */

  audio.addEventListener("play",()=>{

    if(currentAudio &&
       currentAudio !== audio){

      currentAudio.pause();

    }

    currentAudio = audio;

    bars.forEach(bar=>{

      bar.classList.add("active");

    });

  });

  /* STOP VISUALIZER */

  audio.addEventListener("pause",()=>{

    bars.forEach(bar=>{

      bar.classList.remove("active");

    });

  });

  audio.addEventListener("ended",()=>{

    bars.forEach(bar=>{

      bar.classList.remove("active");

    });

  });

  /* LIKE */

  const likeBtn =
  card.querySelector(".like-btn");

  likeBtn.addEventListener("click",()=>{

    if(!likedSongs.includes(track.title)){

      likedSongs.push(track.title);

      localStorage.setItem(
        "likedSongs",
        JSON.stringify(likedSongs)
      );

      renderLikedSongs();

    }

  });

  /* PLAYLIST */

  const playlistBtn =
  card.querySelector(".playlist-btn");

  playlistBtn.addEventListener("click",()=>{

    if(!playlistSongs.includes(track.title)){

      playlistSongs.push(track.title);

      localStorage.setItem(
        "playlistSongs",
        JSON.stringify(playlistSongs)
      );

      renderPlaylist();

    }

  });

  tracksContainer.appendChild(card);

});

/* =========================
LIKED SONGS
========================= */

function renderLikedSongs(){

  const likedContainer =
  document.getElementById("likedSongs");

  likedContainer.innerHTML = "";

  likedSongs.forEach(title=>{

    const div =
    document.createElement("div");

    div.className =
    "saved-track";

    div.innerText = title;

    likedContainer.appendChild(div);

  });

}

/* =========================
PLAYLIST
========================= */

function renderPlaylist(){

  const playlistContainer =
  document.getElementById("playlistSongs");

  playlistContainer.innerHTML = "";

  playlistSongs.forEach(title=>{

    const div =
    document.createElement("div");

    div.className =
    "saved-track";

    div.innerText = title;

    playlistContainer.appendChild(div);

  });

}

/* =========================
INITIALIZE
========================= */

renderLikedSongs();
renderPlaylist();

</script>

</body>
</html>
