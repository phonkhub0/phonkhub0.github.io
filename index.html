<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Phonkhub</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:white;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* TOP */

#topBar{
  position:sticky;
  top:0;
  z-index:9999;
  background:#050505ee;
  backdrop-filter:blur(12px);
  padding:18px;
  border-bottom:1px solid #222;
}

.top-section{
  margin-bottom:20px;
}

.top-title{
  font-size:1.2rem;
  margin-bottom:10px;
}

.horizontal-list{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.saved-item{
  background:#111;
  border:1px solid #222;
  border-radius:14px;
  padding:12px;
  min-width:160px;
  cursor:pointer;
}

.saved-item:hover{
  border-color:#ff9900;
}

#createPlaylist{
  width:45px;
  height:45px;
  border:none;
  border-radius:50%;
  background:#ff9900;
  color:black;
  font-size:1.5rem;
  cursor:pointer;
}

/* HERO */

.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:4rem;
}

.hero p{
  color:#888;
  margin-top:10px;
}

/* TRACKS */

.tracks{
  width:min(1400px,95%);
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:25px;
  padding-bottom:100px;
}

.card{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:24px;
  overflow:hidden;
}

.card:hover{
  border-color:#ff9900;
}

.legendary{
  box-shadow:
    0 0 30px #ff990066,
    0 0 80px #ff000033;
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.card-content{
  padding:20px;
}

.card h2{
  margin-bottom:10px;
}

.card p{
  color:#888;
  margin-bottom:15px;
}

/* VISUALIZER */

.visualizer{
  display:flex;
  align-items:flex-end;
  gap:4px;
  height:40px;
  margin-bottom:15px;
}

.bar{
  flex:1;
  background:#ff9900;
  border-radius:999px;
  height:10px;
}

.bar.active{
  animation:bounce 1s infinite ease-in-out;
}

.bar:nth-child(2){
  animation-delay:.2s;
}

.bar:nth-child(3){
  animation-delay:.4s;
}

.bar:nth-child(4){
  animation-delay:.6s;
}

.bar:nth-child(5){
  animation-delay:.8s;
}

@keyframes bounce{

  0%,100%{
    transform:scaleY(.5);
  }

  50%{
    transform:scaleY(2);
  }

}

/* AUDIO */

audio{
  width:100%;
}

/* BUTTONS */

.actions{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.icon-btn{
  width:50px;
  height:50px;
  border:none;
  border-radius:50%;
  background:#1a1a1a;
  color:white;
  font-size:1.2rem;
  cursor:pointer;
}

.icon-btn:hover{
  background:#ff9900;
  color:black;
}

/* PLAYLIST PLAYER */

#overlay{
  position:fixed;
  inset:0;
  background:#000000ee;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999999;
}

#playerScreen{
  width:min(500px,90%);
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:24px;
  padding:25px;
  text-align:center;
  position:relative;
}

#playerCover{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:20px;
  margin-bottom:20px;
}

#playerTitle{
  margin-bottom:15px;
}

#playerAudio{
  width:100%;
}

.player-controls{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.player-controls button{
  width:60px;
  height:60px;
  border:none;
  border-radius:50%;
  background:#ff9900;
  color:black;
  font-size:1.5rem;
  cursor:pointer;
}

#closePlayer{
  position:absolute;
  top:15px;
  right:15px;
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:#222;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<div id="topBar">

  <div class="top-section">

    <div class="top-title">
      ❤️ Liked Songs
    </div>

    <div
      class="horizontal-list"
      id="likedList">
    </div>

  </div>

  <div class="top-section">

    <div style="
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    ">

      <div class="top-title">
        📀 Playlists
      </div>

      <button id="createPlaylist">
        +
      </button>

    </div>

    <div
      class="horizontal-list"
      id="playlistList">
    </div>

  </div>

</div>

<section class="hero">

  <h1>PHONKHUB</h1>

  <p>
    maximum aura detected
  </p>

</section>

<section
  class="tracks"
  id="tracks">
</section>

<div id="overlay">

  <div id="playerScreen">

    <button id="closePlayer">
      ✕
    </button>

    <img id="playerCover">

    <h1 id="playerTitle">
      Track
    </h1>

    <audio
      id="playerAudio"
      controls>
    </audio>

    <div class="player-controls">

      <button id="backBtn">
        ⏮
      </button>

      <button id="shuffleBtn">
        🔀
      </button>

      <button id="nextBtn">
        ⏭
      </button>

    </div>

  </div>

</div>

<script>

/* TRACKS */

const tracks = [

{
title:"PASSO BEM SOLTO",
desc:"3am epstien sigma phonk balkan aura 🥷🏿🍑🗿🍷🇮🇱.",
cover:"/IMG_3842.jpeg",
audio:"/ATLXS__PASSO_BEM_SOLTO.m4a",
rating:6
},

{
title:"YARA YARA PHONK",
desc:"forbidden phonk me and the boiz 😈🇮🇱🥷🏿🗿🍷.",
cover:"/IMG_3041.jpeg",
audio:"/YTDown_YouTube_Media_zdgtyoxKb6k_009_128k.mp3",
rating:10
},

{
title:"MI PAN X YARAYARA",
desc:"aura of letter t 🗿🗿🥷🏿🥷🏿🥷🏿🍗🍗🔫🔫🔫.",
cover:"/IMG_2220.png",
audio:"/ssstik.io_1779248438589.mp3",
rating:9
},

{
title:"YA LILI",
desc:"sahur boom.",
cover:"/IMG_2232.jpeg",
audio:"/Yalili yalila song in fast and furious--fast and furious 8--fast and furious 8 yalili yalila song.mp3",
rating:8
}

];

/* STORAGE */

let likedSongs =
JSON.parse(
localStorage.getItem("likedSongs")
) || [];

let playlists =
JSON.parse(
localStorage.getItem("playlists")
) || {};

/* AUDIO */

let currentAudio = null;

/* RENDER TRACKS */

const tracksContainer =
document.getElementById("tracks");

tracks.forEach(track=>{

  const card =
  document.createElement("div");

  card.className =
  track.rating >= 9
  ? "card legendary"
  : "card";

  card.innerHTML = `

    <img src="${track.cover}">

    <div class="card-content">

      <h2>${track.title}</h2>

      <p>${track.desc}</p>

      <div class="visualizer">

        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>

      </div>

      <audio controls>

        <source src="${track.audio}">

      </audio>

      <div class="actions">

        <button class="icon-btn likeBtn">
          ❤️
        </button>

        <button class="icon-btn playlistBtn">
          📀
        </button>

      </div>

    </div>

  `;

  const audio =
  card.querySelector("audio");

  const bars =
  card.querySelectorAll(".bar");

  audio.addEventListener("play",()=>{

    if(currentAudio &&
       currentAudio !== audio){

      currentAudio.pause();

      document
      .querySelectorAll(".bar")
      .forEach(bar=>{

        bar.classList.remove("active");

      });

    }

    currentAudio = audio;

    bars.forEach(bar=>{

      bar.classList.add("active");

    });

  });

  audio.addEventListener("pause",()=>{

    bars.forEach(bar=>{

      bar.classList.remove("active");

    });

  });

  audio.addEventListener("ended",()=>{

    bars.forEach(bar=>{

      bar.classList.remove("active");

    });

  });

  /* LIKE */

  card.querySelector(".likeBtn")
  .addEventListener("click",()=>{

    if(!likedSongs.includes(track.title)){

      likedSongs.push(track.title);

      localStorage.setItem(
        "likedSongs",
        JSON.stringify(likedSongs)
      );

      renderLiked();

    }

  });

  /* PLAYLIST */

  card.querySelector(".playlistBtn")
  .addEventListener("click",()=>{

    const name =
    prompt("Playlist name");

    if(!name) return;

    if(!playlists[name]){

      playlists[name] = [];

    }

    playlists[name].push(track.title);

    localStorage.setItem(
      "playlists",
      JSON.stringify(playlists)
    );

    renderPlaylists();

  });

  tracksContainer.appendChild(card);

});

/* LIKED */

function renderLiked(){

  const list =
  document.getElementById("likedList");

  list.innerHTML = "";

  likedSongs.forEach(song=>{

    const div =
    document.createElement("div");

    div.className =
    "saved-item";

    div.innerText = song;

    list.appendChild(div);

  });

}

/* PLAYLISTS */

function renderPlaylists(){

  const list =
  document.getElementById("playlistList");

  list.innerHTML = "";

  Object.keys(playlists)
  .forEach(name=>{

    const div =
    document.createElement("div");

    div.className =
    "saved-item";

    div.innerText =
    `${name}
(${playlists[name].length})`;

    div.addEventListener("click",()=>{

      openPlaylist(name);

    });

    list.appendChild(div);

  });

}

/* CREATE PLAYLIST */

document.getElementById(
"createPlaylist"
).addEventListener("click",()=>{

  const name =
  prompt("Playlist name");

  if(!name) return;

  playlists[name] = [];

  localStorage.setItem(
    "playlists",
    JSON.stringify(playlists)
  );

  renderPlaylists();

});

/* PLAYER */

let currentPlaylist = [];
let currentIndex = 0;

function openPlaylist(name){

  currentPlaylist =
  playlists[name]
  .map(title=>
    tracks.find(
      t=>t.title===title
    )
  );

  currentIndex = 0;

  document.getElementById(
    "overlay"
  ).style.display = "flex";

  playCurrent();

}

function playCurrent(){

  const track =
  currentPlaylist[currentIndex];

  if(!track) return;

  document.getElementById(
    "playerCover"
  ).src =
  track.cover;

  document.getElementById(
    "playerTitle"
  ).innerText =
  track.title;

  const player =
  document.getElementById(
    "playerAudio"
  );

  player.src =
  track.audio;

  player.play();

}

/* CONTROLS */

document.getElementById(
"nextBtn"
).addEventListener("click",()=>{

  currentIndex++;

  if(currentIndex >=
     currentPlaylist.length){

    currentIndex = 0;

  }

  playCurrent();

});

document.getElementById(
"backBtn"
).addEventListener("click",()=>{

  currentIndex--;

  if(currentIndex < 0){

    currentIndex =
    currentPlaylist.length-1;

  }

  playCurrent();

});

document.getElementById(
"shuffleBtn"
).addEventListener("click",()=>{

  currentIndex =
  Math.floor(
    Math.random() *
    currentPlaylist.length
  );

  playCurrent();

});

document.getElementById(
"closePlayer"
).addEventListener("click",()=>{

  document.getElementById(
    "overlay"
  ).style.display = "none";

  document.getElementById(
    "playerAudio"
  ).pause();

});

/* INIT */

renderLiked();
renderPlaylists();

</script>

</body>
</html>
