<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Phonkhub</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>

/* =========================
RESET
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:white;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* =========================
SCROLLBAR
========================= */

::-webkit-scrollbar{
  width:10px;
}

::-webkit-scrollbar-track{
  background:#0f0f0f;
}

::-webkit-scrollbar-thumb{
  background:#ff9900;
  border-radius:999px;
}

/* =========================
INTRO
========================= */

#intro{
  position:fixed;
  inset:0;
  background:black;
  z-index:999999;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.intro-particles{
  position:absolute;
  width:100%;
  height:100%;
}

.particle{
  position:absolute;
  width:4px;
  height:4px;
  border-radius:50%;
  background:#ff9900;
  opacity:.5;
  animation:float linear infinite;
}

@keyframes float{

  from{
    transform:translateY(100vh) scale(0);
  }

  to{
    transform:translateY(-10vh) scale(1.5);
  }

}

.intro-glow{
  position:absolute;
  width:700px;
  height:700px;
  background:radial-gradient(circle,#ff990033,transparent 70%);
  animation:pulse 4s infinite;
}

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.2);
  }

  100%{
    transform:scale(1);
  }

}

.intro-content{
  position:relative;
  text-align:center;
  z-index:10;
  animation:introFade 1.5s ease;
}

@keyframes introFade{

  from{
    opacity:0;
    transform:translateY(30px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

.intro-logo{
  font-size:6rem;
  font-weight:900;
  text-shadow:
    0 0 20px #ff9900,
    0 0 70px #ff9900;
}

.intro-logo span{
  background:#ff9900;
  color:black;
  padding:6px 15px;
  border-radius:12px;
}

.intro-sub{
  margin-top:20px;
  color:#999;
  letter-spacing:8px;
  animation:flicker 2s infinite;
}

@keyframes flicker{

  0%,100%{
    opacity:1;
  }

  50%{
    opacity:.5;
  }

}

.enter-btn{
  margin-top:35px;
  border:none;
  background:#ff9900;
  color:black;
  padding:18px 50px;
  border-radius:16px;
  font-weight:900;
  cursor:pointer;
  font-size:1rem;
  transition:.3s;
  box-shadow:0 0 40px #ff990066;
}

.enter-btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 80px #ff9900;
}

/* =========================
HEADER
========================= */

header{
  position:sticky;
  top:0;
  z-index:1000;
  backdrop-filter:blur(10px);
  background:#000000cc;
  border-bottom:1px solid #1d1d1d;
}

.nav{
  max-width:1400px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.logo{
  font-size:2.5rem;
  font-weight:900;
}

.logo span{
  background:#ff9900;
  color:black;
  padding:4px 10px;
  border-radius:10px;
}

.top-btn{
  background:#111;
  border:1px solid #222;
  color:white;
  padding:12px 18px;
  border-radius:12px;
}

/* =========================
HERO
========================= */

.hero{
  text-align:center;
  padding:100px 20px 60px;
}

.hero h1{
  font-size:5rem;
  margin-bottom:20px;
}

.hero p{
  max-width:700px;
  margin:auto;
  color:#999;
  line-height:1.7;
}

.hero-meter{
  margin:50px auto;
  width:min(700px,90%);
}

.meter-labels{
  display:flex;
  justify-content:space-between;
  color:#888;
  margin-bottom:10px;
}

.meter{
  background:#111;
  border:1px solid #222;
  border-radius:999px;
  overflow:hidden;
  height:20px;
}

.meter-fill{
  height:100%;
  width:92%;
  background:linear-gradient(
    90deg,
    #444,
    #ff9900,
    #ff0000
  );
  animation:meterMove 3s infinite alternate;
}

@keyframes meterMove{

  from{
    width:70%;
  }

  to{
    width:100%;
  }

}

/* =========================
TRACKS
========================= */

.section-title{
  text-align:center;
  font-size:3rem;
  margin-bottom:40px;
}

.tracks{
  width:min(1450px,95%);
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
  gap:30px;
  padding-bottom:100px;
}

.card{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:25px;
  overflow:hidden;
  transition:.3s;
  position:relative;
}

.card:hover{
  transform:translateY(-10px);
  border-color:#ff9900;
}

.legendary{
  animation:legendaryGlow 2s infinite alternate;
}

@keyframes legendaryGlow{

  from{
    box-shadow:
      0 0 20px #ff990044,
      0 0 40px #ff000022;
  }

  to{
    box-shadow:
      0 0 50px #ff9900aa,
      0 0 100px #ff000066;
  }

}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.card-content{
  padding:22px;
}

.card h2{
  margin-bottom:10px;
}

.card p{
  color:#999;
  margin-bottom:20px;
}

.visualizer{
  display:flex;
  align-items:flex-end;
  gap:4px;
  height:45px;
  margin-bottom:15px;
}

.bar{
  width:100%;
  background:#ff9900;
  border-radius:999px;
  animation:bounce 1s infinite ease-in-out;
}

.bar:nth-child(1){
  height:20px;
}

.bar:nth-child(2){
  height:35px;
  animation-delay:.2s;
}

.bar:nth-child(3){
  height:25px;
  animation-delay:.4s;
}

.bar:nth-child(4){
  height:45px;
  animation-delay:.6s;
}

.bar:nth-child(5){
  height:18px;
  animation-delay:.8s;
}

@keyframes bounce{

  0%,100%{
    transform:scaleY(.5);
  }

  50%{
    transform:scaleY(1.2);
  }

}

audio{
  width:100%;
  margin-bottom:18px;
}

.rating{
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:#ff9900;
  font-weight:900;
}

.aura-badge{
  padding:8px 12px;
  border-radius:999px;
  background:#1b1b1b;
  border:1px solid #2a2a2a;
}

/* =========================
FOOTER
========================= */

footer{
  text-align:center;
  padding:40px 20px;
  color:#666;
  border-top:1px solid #1d1d1d;
}

/* =========================
MOBILE
========================= */

@media(max-width:700px){

  .intro-logo{
    font-size:3.5rem;
  }

  .hero h1{
    font-size:2.8rem;
  }

  .section-title{
    font-size:2rem;
  }

}

</style>
</head>

<body>

<!-- =========================
INTRO
========================= -->

<div id="intro">

  <div class="intro-particles" id="particles"></div>

  <div class="intro-glow"></div>

  <div class="intro-content">

    <div class="intro-logo">
      Phonk<span>hub</span>
    </div>

    <div class="intro-sub">
      MAXIMUM AURA DETECTED
    </div>

    <button class="enter-btn" onclick="enterSite()">
      ENTER THE PHONK
    </button>

  </div>

</div>

<!-- =========================
HEADER
========================= -->

<header>

  <div class="nav">

    <div class="logo">
      Phonk<span>hub</span>
    </div>

    <button class="top-btn">
      TOP SIGMAS 🔥
    </button>

  </div>

</header>

<!-- =========================
HERO
========================= -->

<section class="hero">

  <h1>UPLOAD THE HARDEST PHONK</h1>

  <p>
    Ranked from weak civilian trollface energy
    to ULTRA AURA cosmic sigma drift phonk.
  </p>

  <div class="hero-meter">

    <div class="meter-labels">
      <span>🙂 Base Trollface</span>
      <span>💀 Ultra Aura</span>
    </div>

    <div class="meter">
      <div class="meter-fill"></div>
    </div>

  </div>

</section>

<!-- =========================
TRACKS
========================= -->

<h1 class="section-title">
  TOP AURA TRACKS
</h1>

<section class="tracks" id="tracks"></section>

<footer>
  Phonkhub © 2026 — ONLY REAL AURA SURVIVES
</footer>

<script>

/* =========================
INTRO PARTICLES
========================= */

const particlesContainer =
document.getElementById("particles");

for(let i=0;i<90;i++){

  const particle =

  Math.random();

  particle.style.height =

}

  }

========================= */

const tracksContainer =
document.getElementById("tracks");

</script>

</body>
</html>
