<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Phonkhub</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:white;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* =========================
INTRO
========================= */

#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999999;
  overflow:hidden;
}

.intro-particles{
  position:absolute;
  width:100%;
  height:100%;
}

.particle{
  position:absolute;
  width:4px;
  height:4px;
  background:#ff9900;
  border-radius:50%;
  animation:float linear infinite;
}

@keyframes float{
  from{
    transform:translateY(100vh);
    opacity:0;
  }
  to{
    transform:translateY(-20vh);
    opacity:1;
  }
}

.intro-glow{
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle,#ff990044,transparent 70%);
  animation:pulse 4s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.15);}
  100%{transform:scale(1);}
}

.intro-content{
  position:relative;
  text-align:center;
  z-index:5;
}

.intro-logo{
  font-size:6rem;
  font-weight:900;
  text-shadow:
    0 0 20px #ff9900,
    0 0 60px #ff9900;
}

.intro-logo span{
  background:#ff9900;
  color:black;
  padding:5px 14px;
  border-radius:12px;
}

.intro-sub{
  margin-top:20px;
  color:#888;
  letter-spacing:7px;
}

.enter-btn{
  margin-top:30px;
  border:none;
  background:#ff9900;
  color:black;
  font-weight:900;
  padding:18px 50px;
  border-radius:16px;
  cursor:pointer;
  font-size:1rem;
}

/* =========================
HEADER
========================= */

header{
  position:sticky;
  top:0;
  background:#000000cc;
  backdrop-filter:blur(10px);
  border-bottom:1px solid #1d1d1d;
  z-index:1000;
}

.nav{
  max-width:1300px;
  margin:auto;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:2.5rem;
  font-weight:900;
}

.logo span{
  background:#ff9900;
  color:black;
  padding:4px 10px;
  border-radius:10px;
}

/* =========================
HERO
========================= */

.hero{
  padding:90px 20px 50px;
  text-align:center;
}

.hero h1{
  font-size:4rem;
  margin-bottom:15px;
}

.hero p{
  color:#888;
  max-width:700px;
  margin:auto;
}

/* =========================
UPLOAD
========================= */

.upload-box{
  width:min(850px,92%);
  margin:auto;
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:24px;
  padding:30px;
}

.upload-box h2{
  margin-bottom:20px;
}

input,
textarea,
select{
  width:100%;
  margin-top:15px;
  padding:16px;
  border:none;
  border-radius:14px;
  background:#181818;
  color:white;
}

textarea{
  min-height:120px;
}

.upload-label{
  display:block;
  margin-top:20px;
  color:#ff9900;
  font-weight:700;
}

.upload-btn{
  width:100%;
  margin-top:20px;
  border:none;
  background:#ff9900;
  color:black;
  font-weight:900;
  padding:18px;
  border-radius:14px;
  cursor:pointer;
}

.status{
  margin-top:15px;
  color:#ff9900;
}

/* =========================
TRACKS
========================= */

.section-title{
  text-align:center;
  font-size:3rem;
  margin:70px 0 30px;
}

.tracks{
  width:min(1400px,95%);
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(330px,1fr));
  gap:25px;
  padding-bottom:100px;
}

.card{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:24px;
  overflow:hidden;
  transition:.3s;
}

.card:hover{
  transform:translateY(-8px);
  border-color:#ff9900;
}

.legendary{
  box-shadow:
    0 0 30px #ff990055,
    0 0 80px #ff000044;
}

.card img{
  width:100%;
  height:240px;
  object-fit:cover;
}

.card-content{
  padding:20px;
}

.card p{
  color:#999;
  margin:12px 0;
}

audio{
  width:100%;
  margin:15px 0;
}

.rating{
  display:flex;
  justify-content:space-between;
  color:#ff9900;
  font-weight:900;
}

/* =========================
FOOTER
========================= */

footer{
  text-align:center;
  color:#666;
  padding:40px 20px;
  border-top:1px solid #1d1d1d;
}

/* MOBILE */

@media(max-width:700px){

  .intro-logo{
    font-size:3.5rem;
  }

  .hero h1{
    font-size:2.5rem;
  }

}

</style>
</head>

<body>

<!-- INTRO -->

<div id="intro">

  <div class="intro-particles" id="particles"></div>

  <div class="intro-glow"></div>

  <div class="intro-content">

    <div class="intro-logo">
      Phonk<span>hub</span>
    </div>

    <div class="intro-sub">
      MAXIMUM AURA DETECTED
    </div>

    <button class="enter-btn" onclick="enterSite()">
      ENTER THE PHONK
    </button>

  </div>

</div>

<!-- HEADER -->

<header>

  <div class="nav">

    <div class="logo">
      Phonk<span>hub</span>
    </div>

  </div>

</header>

<!-- HERO -->

<section class="hero">

  <h1>UPLOAD THE HARDEST PHONK</h1>

  <p>
    Upload tracks. Gain aura. Ascend beyond mortal sigma levels.
  </p>

</section>

<!-- UPLOAD -->

<section class="upload-box">

  <h2>Upload Aura</h2>

  <input type="text" id="title" placeholder="Track name">

  <textarea id="desc" placeholder="Describe the aura..."></textarea>

  <label class="upload-label">
    Upload Audio
  </label>

  <input type="file" id="audioFile" accept="audio/*">

  <label class="upload-label">
    Upload Cover Art
  </label>

  <input type="file" id="coverFile" accept="image/*">

  <select id="rating">

    <option value="1">1 - Base Trollface</option>
    <option value="2">2 - Beginner Sigma</option>
    <option value="3">3 - Drift Kid</option>
    <option value="4">4 - Gym Aura</option>
    <option value="5">5 - Edit Material</option>
    <option value="6">6 - Balkan Rage</option>
    <option value="7">7 - Brazilian Sigma</option>
    <option value="8">8 - Cosmic Drift</option>
    <option value="9">9 - Ascended Aura</option>
    <option value="10">10 - ULTRA AURA</option>

  </select>

  <button class="upload-btn" onclick="uploadTrack()">
    UPLOAD PHONK
  </button>

  <div class="status" id="status"></div>

</section>

<!-- TRACKS -->

<h1 class="section-title">
  TOP AURA TRACKS
</h1>

<section class="tracks" id="tracks"></section>

<footer>
  Phonkhub © 2026 — ONLY REAL AURA SURVIVES
</footer>

<!-- FIREBASE -->

<script type="module">

/* =========================
FIREBASE IMPORTS
========================= */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* =========================
YOUR FIREBASE CONFIG
PASTE YOURS HERE
========================= */

const firebaseConfig = {


  apiKey: "AIzaSyA-D6pxL3_QTPCdqKU9w-uTrkAecRHmhLM",
  
  authDomain: "phonkhubsahur.firebaseapp.com",
 
  projectId: "phonkhubsahur",
 
  storageBucket: "phonkhubsahur.firebasestorage.app",
 
  messagingSenderId: "1005113223908",
  
  appId: "1:1005113223908:web:6210d2011a2ad87c4e1af1",

};

/* =========================
INIT
========================= */

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const storage =
getStorage(app);

/* =========================
INTRO PARTICLES
========================= */

const particles =
document.getElementById("particles");

for(let i=0;i<80;i++){

  const p =
  document.createElement("div");

  p.classList.add("particle");

  p.style.left =
  Math.random()*100 + "vw";

  p.style.animationDuration =
  3 + Math.random()*5 + "s";

  particles.appendChild(p);

}

/* =========================
ENTER SITE
========================= */

window.enterSite = function(){

  const intro =
  document.getElementById("intro");

  intro.style.transition =
  "1s";

  intro.style.opacity = "0";

  setTimeout(()=>{
    intro.remove();
  },1000);

}

/* =========================
LOAD TRACKS
========================= */

async function loadTracks(){

  const tracksContainer =
  document.getElementById("tracks");

  tracksContainer.innerHTML = "";

  const q =
  query(
    collection(db,"tracks"),
    orderBy("created","desc")
  );

  const snapshot =
  await getDocs(q);

  snapshot.forEach(doc => {

    createTrackCard(doc.data());

  });

}

/* =========================
CREATE CARD
========================= */

function createTrackCard(track){

  let aura = "🙂";
  let auraText = "BASE";

  if(track.rating >= 3){
    aura = "😎";
    auraText = "SIGMA";
  }

  if(track.rating >= 5){
    aura = "🔥";
    auraText = "DRIFT";
  }

  if(track.rating >= 7){
    aura = "😈";
    auraText = "COSMIC";
  }

  if(track.rating >= 9){
    aura = "💀";
    auraText = "ULTRA AURA";
  }

  const card =
  document.createElement("div");

  card.className =
  track.rating >= 9
  ? "card legendary"
  : "card";

  card.innerHTML = `

    <img src="${track.coverUrl}">

    <div class="card-content">

      <h2>${track.title}</h2>

      <p>${track.desc}</p>

      <audio controls>
        <source src="${track.audioUrl}">
      </audio>

      <div class="rating">

        <span>${aura} ${auraText}</span>

        <span>${track.rating}/10</span>

      </div>

    </div>

  `;

  document.getElementById("tracks")
  .appendChild(card);

}

/* =========================
UPLOAD TRACK
========================= */

window.uploadTrack = async function(){

  const status =
  document.getElementById("status");

  const title =
  document.getElementById("title").value;

  const desc =
  document.getElementById("desc").value;

  const rating =
  parseInt(
    document.getElementById("rating").value
  );

  const audioFile =
  document.getElementById("audioFile").files[0];

  const coverFile =
  document.getElementById("coverFile").files[0];

  if(!title || !audioFile || !coverFile){

    alert("upload everything bro");

    return;
  }

  try{

    status.innerText =
    "Uploading aura...";

    /* AUDIO */

    const audioRef =
    ref(
      storage,
      `tracks/${Date.now()}-${audioFile.name}`
    );

    await uploadBytes(audioRef,audioFile);

    const audioUrl =
    await getDownloadURL(audioRef);

    /* COVER */

    const coverRef =
    ref(
      storage,
      `covers/${Date.now()}-${coverFile.name}`
    );

    await uploadBytes(coverRef,coverFile);

    const coverUrl =
    await getDownloadURL(coverRef);

    /* SAVE FIRESTORE */

    await addDoc(
      collection(db,"tracks"),
      {

        title:title,

        desc:desc,

        rating:rating,

        audioUrl:audioUrl,

        coverUrl:coverUrl,

        created:Date.now()

      }
    );

    status.innerText =
    "AURA UPLOADED 🔥";

    document.getElementById("title").value="";
    document.getElementById("desc").value="";
    document.getElementById("audioFile").value="";
    document.getElementById("coverFile").value="";

    loadTracks();

  }catch(err){

    console.error(err);

    status.innerText =
    "upload failed 💀";

  }

}

/* =========================
LOAD ON START
========================= */

loadTracks();

</script>

</body>
</html>
