rating:1
}

];

/* =========================
STORAGE
========================= */

let likedSongs =
JSON.parse(
localStorage.getItem("likedSongs")
) || [];

let playlists =
JSON.parse(
localStorage.getItem("playlists")
) || {};

let currentAudio = null;

let currentPlaylist = [];
let currentPlaylistIndex = 0;

/* =========================
CREATE TOP UI
========================= */

document.body.insertAdjacentHTML(
"afterbegin",

`

<div id="topLibrary">

  <div class="library-section">

    <h2>❤️ Liked</h2>

    <div id="likedContainer"></div>

  </div>

  <div class="library-section">

    <div class="playlist-top">

      <h2>📀 Playlists</h2>

      <button id="newPlaylistBtn">
        +
      </button>

    </div>

    <div id="playlistContainer"></div>

  </div>

</div>

<div id="playlistOverlay">

  <div id="playlistScreen">

    <button id="closeOverlay">
      ✕
    </button>

    <img id="playlistCover">

    <h1 id="playlistSongTitle">
      Track
    </h1>

    <audio id="playlistPlayer" controls></audio>

    <div id="playlistControls">

      <button id="backBtn">
        ⏮
      </button>

      <button id="shuffleBtn">
        🔀
      </button>

      <button id="forwardBtn">
        ⏭
      </button>

    </div>

  </div>

</div>

`

);

/* =========================
STYLE
========================= */

const style =
document.createElement("style");

style.innerHTML = `

#topLibrary{

  position:sticky;
  top:0;
  z-index:5000;
  background:#050505;
  padding:20px;
  border-bottom:1px solid #222;

}

.library-section{

  margin-bottom:20px;

}

#likedContainer,
#playlistContainer{

  display:flex;
  gap:10px;
  overflow-x:auto;
  padding-top:10px;

}

.savedItem{

  min-width:160px;
  background:#111;
  border:1px solid #222;
  border-radius:14px;
  padding:12px;
  cursor:pointer;
  transition:.2s;

}

.savedItem:hover{

  border-color:#ff9900;

}

.playlist-top{

  display:flex;
  justify-content:space-between;
  align-items:center;

}

#newPlaylistBtn{

  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:#ff9900;
  color:black;
  font-size:1.3rem;
  cursor:pointer;

}

.track-actions{

  display:flex;
  gap:10px;
  margin-top:15px;

}

.icon-btn{

  width:45px;
  height:45px;
  border:none;
  border-radius:50%;
  background:#1b1b1b;
  color:white;
  font-size:1.2rem;
  cursor:pointer;
  transition:.2s;

}

.icon-btn:hover{

  background:#ff9900;
  color:black;

}

.visualizer{

  display:flex;
  align-items:flex-end;
  gap:4px;
  height:45px;
  margin-bottom:15px;

}

.bar{

  width:100%;
  height:10px;
  background:#ff9900;
  border-radius:999px;

}

.bar.active{

  animation:bounce 1s infinite ease-in-out;

}

.bar:nth-child(1){
  animation-delay:0s;
}

.bar:nth-child(2){
  animation-delay:.2s;
}

.bar:nth-child(3){
  animation-delay:.4s;
}

.bar:nth-child(4){
  animation-delay:.6s;
}

.bar:nth-child(5){
  animation-delay:.8s;
}

@keyframes bounce{

  0%,100%{
    transform:scaleY(.4);
  }

  50%{
    transform:scaleY(2);
  }

}

#playlistOverlay{

  position:fixed;
  inset:0;
  background:#000000ee;
  z-index:999999;
  display:none;
  justify-content:center;
  align-items:center;

}

#playlistScreen{

  width:min(500px,90%);
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:25px;
  padding:30px;
  text-align:center;
  position:relative;

}

#playlistCover{

  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:20px;
  margin-bottom:20px;

}

#playlistControls{

  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;

}

#playlistControls button{

  width:60px;

#closeOverlay{

`;

document.head.appendChild(style);

/* =========================
RENDER TRACKS
========================= */

const tracksContainer =
document.getElementById("tracks");

tracks.forEach(track=>{

  const card =
  document.createElement("div");

  card.className =
  track.rating >= 9
  ? "card legendary"
  : "card";

  card.innerHTML = `

    <img src="${track.cover}">

    <div class="card-content">

      <h2>${track.title}</h2>

      <p>${track.desc}</p>

      <div class="visualizer">

        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>

      </div>

      <audio controls>

        <source src="${track.audio}">

      </audio>

      <div class="track-actions">

        <button class="icon-btn like-btn">
          ❤️
        </button>

        <button class="icon-btn playlist-btn">
          📀
        </button>

      </div>

    </div>

  `;

  const audio =
  card.querySelector("audio");

  const bars =
  card.querySelectorAll(".bar");

  /* AUDIO CONTROL */

  audio.addEventListener("play",()=>{

    if(currentAudio &&
       currentAudio !== audio){

      currentAudio.pause();

      document
      .querySelectorAll(".bar")
      .forEach(bar=>{

        bar.classList.remove("active");

      });

    }

    currentAudio = audio;

    bars.forEach(bar=>{

      bar.classList.add("active");

    });

  });

  audio.addEventListener("pause",()=>{

    bars.forEach(bar=>{

      bar.classList.remove("active");

    });

  });

  audio.addEventListener("ended",()=>{

    bars.forEach(bar=>{

      bar.classList.remove("active");

    });

  });

  /* LIKE */

  card.querySelector(".like-btn")
  .addEventListener("click",()=>{

    if(!likedSongs.includes(track.title)){

      likedSongs.push(track.title);

      localStorage.setItem(
        "likedSongs",
        JSON.stringify(likedSongs)
      );

      renderLiked();

    }

  });

  /* PLAYLIST */

  card.querySelector(".playlist-btn")
  .addEventListener("click",()=>{

    const playlistName =
    prompt(
      "Enter playlist name"
    );

    if(!playlistName) return;

    if(!playlists[playlistName]){

      playlists[playlistName] = [];

    }

    playlists[playlistName]
    .push(track.title);

    localStorage.setItem(
      "playlists",
      JSON.stringify(playlists)
    );

    renderPlaylists();

  });

  tracksContainer.appendChild(card);

});

/* =========================
RENDER LIKED
========================= */

function renderLiked(){

  const container =
  document.getElementById("likedContainer");

  container.innerHTML = "";

  likedSongs.forEach(song=>{

    const div =
    document.createElement("div");

    div.className =
    "savedItem";

    div.innerText = song;

    container.appendChild(div);

  });

}

/* =========================
RENDER PLAYLISTS
========================= */

function renderPlaylists(){

  const container =
  document.getElementById("playlistContainer");

  container.innerHTML = "";

  Object.keys(playlists)
  .forEach(name=>{

    const div =
    document.createElement("div");

    div.className =
    "savedItem";

    div.innerText =
    `${name}
(${playlists[name].length})`;

    div.addEventListener("click",()=>{

      openPlaylist(name);

    });

    container.appendChild(div);

  });

}

/* =========================
NEW PLAYLIST
========================= */

document.getElementById(
"newPlaylistBtn"
).addEventListener("click",()=>{

  const name =
  prompt("Playlist name");

  if(!name) return;

  if(!playlists[name]){

    playlists[name] = [];

  }

  localStorage.setItem(
    "playlists",
    JSON.stringify(playlists)
  );

  renderPlaylists();

});

/* =========================
PLAYLIST PLAYER
========================= */

function openPlaylist(name){

  currentPlaylist =
  playlists[name]
  .map(title=>
    tracks.find(
      t=>t.title===title
    )
  );

  currentPlaylistIndex = 0;

  document.getElementById(
    "playlistOverlay"
  ).style.display = "flex";

  playPlaylistSong();

}

function playPlaylistSong(){

  const track =
  currentPlaylist[currentPlaylistIndex];

  if(!track) return;

  const player =
  document.getElementById(
    "playlistPlayer"
  );

  player.src =
  track.audio;

  document.getElementById(
    "playlistCover"
  ).src =
  track.cover;

  document.getElementById(
    "playlistSongTitle"
  ).innerText =
  track.title;

  player.play();

}

/* NEXT */

document.getElementById(
"forwardBtn"
).addEventListener("click",()=>{

  currentPlaylistIndex++;

  if(currentPlaylistIndex >=
     currentPlaylist.length){

    currentPlaylistIndex = 0;

  }

  playPlaylistSong();

});

/* BACK */

document.getElementById(
"backBtn"
).addEventListener("click",()=>{

  currentPlaylistIndex--;

  if(currentPlaylistIndex < 0){

    currentPlaylistIndex =
    currentPlaylist.length-1;

  }

  playPlaylistSong();

});

/* SHUFFLE */

document.getElementById(
"shuffleBtn"
).addEventListener("click",()=>{

  currentPlaylistIndex =
  Math.floor(
    Math.random() *
    currentPlaylist.length
  );

  playPlaylistSong();

});

/* CLOSE */

document.getElementById(
"closeOverlay"
).addEventListener("click",()=>{

  document.getElementById(
    "playlistOverlay"
  ).style.display = "none";

  document.getElementById(
    "playlistPlayer"
  ).pause();

});

/* INIT */

renderLiked();
renderPlaylists();

</script>
